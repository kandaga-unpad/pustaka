apiVersion: v1
kind: Secret
metadata:
  name: voile-secrets
  namespace: voile
type: Opaque
stringData:
  # Replace the values below with your real secrets or create this secret using kubectl create secret
  SECRET_KEY_BASE: "REPLACE_WITH_SECRET_KEY_BASE"
  # You can either put a full DATABASE_URL here, or put individual POSTGRES_* values below.
  DATABASE_URL: "ecto://voile:change_me@voile-postgres:5432/voile_prod"
  POSTGRES_USER: "voile"
  POSTGRES_PASSWORD: "change_me"
  POSTGRES_DB: "voile_prod"
