name: CI — Build, Push, Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  MIX_ENV: prod

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '27'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only $MIX_ENV
          npm ci --prefix assets

      - name: Build assets
        run: |
          npm run deploy --prefix assets || true

      - name: Compile and build release
        run: |
          mix deps.compile
          mix compile
            name: Deploy with Podman Compose

      - name: Log in to container registry
        uses: docker/login-action@v2
              - name: Checkout (for compose files)
                uses: actions/checkout@v4

              - name: Install Podman and podman-compose
                run: |
                  sudo apt-get update
                  sudo apt-get -y install podman buildah python3-pip
                  python3 -m pip install --user podman-compose
                  echo "::add-path::${HOME}/.local/bin"

              - name: Write .env from secrets
                env:
                  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
                  SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  MIX_ENV: prod
                  PORT: 4000
                run: |
                  cat > .env <<EOF
                  POSTGRES_USER=${POSTGRES_USER}
                  POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
                  POSTGRES_DB=${POSTGRES_DB}
                  SECRET_KEY_BASE=${SECRET_KEY_BASE}
                  DATABASE_URL=${DATABASE_URL}
                  MIX_ENV=${MIX_ENV}
                  PORT=${PORT}
                  EOF

              - name: Log in to container registry (podman)
                env:
                  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
                  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
                run: |
                  echo "$REGISTRY_PASSWORD" | podman login $REGISTRY_URL --username $REGISTRY_USERNAME --password-stdin

              - name: Pull image
                env:
                  IMAGE: ${{ secrets.REGISTRY_URL }}/voile:${{ github.sha }}
                run: |
                  podman pull $IMAGE

              - name: Create podman-compose override to use pulled image
                env:
                  IMAGE: ${{ secrets.REGISTRY_URL }}/voile:${{ github.sha }}
                run: |
                  cat > podman-compose.override.yml <<EOF
                  version: '3.8'
                  services:
                    web:
                      image: ${IMAGE}
                  EOF

              - name: Bring up services with podman-compose
                run: |
                  ~/.local/bin/podman-compose -f podman-compose.yml -f podman-compose.override.yml pull
                  ~/.local/bin/podman-compose -f podman-compose.yml -f podman-compose.override.yml up -d
      - name: Checkout (for manifests)
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > $HOME/.kube/config

      - name: Update deployment image and apply manifests
        env:
          IMAGE: ${{ secrets.REGISTRY_URL }}/voile:${{ github.sha }}
        run: |
          kubectl -n voile set image deployment/voile voile=$IMAGE --record || true
          kubectl apply -f k8s/namespace.yaml || true
          kubectl apply -f k8s/secrets.yaml || true
          kubectl apply -f k8s/postgres-deployment.yaml || true
          kubectl apply -f k8s/pdb.yaml || true
          kubectl apply -f k8s/voile-deployment.yaml || true
          kubectl apply -f k8s/voile-service.yaml || true
          kubectl apply -f k8s/voile-ingress.yaml || true
