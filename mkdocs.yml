# VOILE Documentation
# MKDocs Configuration File
# https://www.mkdocs.org/

site_name: VOILE Documentation
site_description: Virtual Organized Information & Library Ecosystem - Documentation
site_author: VOILE Development Team
site_url: https://curatorian.github.io/voile/

# Repository
repo_name: voile
repo_url: https://github.com/curatorian/voile
edit_uri: edit/main/docs/

# Theme
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

# Plugins
plugins:
    - search
    - mermaid2
    # Exclude plugin — prevents listed files/globs from being copied into `site/`.
    # Paths are relative to the `docs/` directory.
    - exclude:
            files:
                # Example: exclude a single page from the build (remove or edit as needed)
                #- features/transfers/flow-diagrams.md
            glob:
                # Example: exclude any draft files named `draft-*.md` anywhere under `docs/`
                - '**/draft-*.md'
                # Example: exclude any file inside a docs-hidden folder
                - '**/docs-hidden/**'
                # Exclude the integrations/payments docs (hide and omit from site/)
                - 'integrations/payments/**'

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

