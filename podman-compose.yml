version: "3.8"

services:
  db:
    image: docker.io/library/postgres:15
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${VOILE_POSTGRES_USER:-voile}
      POSTGRES_PASSWORD: ${VOILE_POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${VOILE_POSTGRES_DB:-voile_dev}
    volumes:
      - db_data:/var/lib/postgresql/data:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VOILE_POSTGRES_USER:-voile}"]
      interval: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Containerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    env_file:
      - .env.dev
    environment:
      # DATABASE_URL can be set explicitly; by default, use Ecto standard URL
      DATABASE_URL: ${VOILE_DATABASE_URL:-ecto://voile:voile@db/voile_dev}
      SECRET_KEY_BASE: ${VOILE_SECRET_KEY}
      MIX_ENV: ${MIX_ENV:-dev}
      PORT: ${PORT:-4000}
    ports:
      - "4000:4000"
    volumes:
      # Bind-mount the source for development. Remove in production.
      - .:/app:Z
      # Mount host static uploads and images so files are immediately visible
      # while developing and testing image processing.
      - ./priv/static/uploads:/app/priv/static/uploads:Z
      - ./priv/static/images:/app/priv/static/images:Z
      - ./priv/static/sfx:/app/priv/static/sfx:Z
    command: sh -c "mix ecto.setup && mix phx.server"

volumes:
  db_data:
    driver: local
