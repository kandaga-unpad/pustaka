version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-voile_dev}
    volumes:
      - db_data:/var/lib/postgresql/data:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voile}"]
      interval: 10s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    env_file:
      - .env
    environment:
      # DATABASE_URL can be set explicitly; by default, use Ecto standard URL
      DATABASE_URL: ${DATABASE_URL:-ecto://$POSTGRES_USER:$POSTGRES_PASSWORD@db/$POSTGRES_DB}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      MIX_ENV: ${MIX_ENV:-dev}
      PORT: ${PORT:-4000}
    ports:
      - "4000:4000"
    volumes:
      # Bind-mount the source for development. Remove in production.
      - .:/app:Z
    command: sh -c "mix ecto.setup && mix phx.server"

volumes:
  db_data:
    driver: local
