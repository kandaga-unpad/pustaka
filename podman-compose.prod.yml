version: "3.8"

services:
  db:
    image: docker.io/library/postgres:15
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${VOILE_POSTGRES_USER:-voile}
      POSTGRES_PASSWORD: ${VOILE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${VOILE_POSTGRES_DB:-voile_prod}
    volumes:
      - db_data:/var/lib/postgresql/data:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VOILE_POSTGRES_USER:-voile}"]
      interval: 10s
      retries: 5
    networks:
      - voile_prod

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MIX_ENV: prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      PHX_SERVER: "true"
      # Allow pg_isready to authenticate when checking DB readiness
      PGPASSWORD: ${VOILE_POSTGRES_PASSWORD}
    ports:
      - "4000:4000"
    volumes:
      # Use the named podman volume to avoid host <-> container UID/GID mapping
      # issues when bind-mounting host directories. This volume is defined
      # at the bottom of this file as `uploads_data`.
      # Mount uploads_data in both possible release locations so Plug.Static
      # can find uploaded files regardless of whether the release serves
      # assets from /app/priv/static or the versioned app priv dir under /app/lib.
      - uploads_data:/app/priv/static/uploads:Z
      - uploads_data:/app/lib/voile-0.1.0/priv/static/uploads:Z
      - ./priv/static/images:/app/priv/static/images:Z
      - ./priv/static/sfx:/app/priv/static/sfx:Z
    networks:
      - voile_prod
    # Wait for DB to be reachable before running the release evals and starting
    command:
      - "/bin/sh"
      - -c
      - |
        echo "Waiting for DB at db:5432..."
        until pg_isready -h db -p 5432 -U ${VOILE_POSTGRES_USER:-voile}; do
          echo "DB not ready yet, sleeping 2s..."
          sleep 2
        done
        echo "DB is ready — running release tasks"
        /app/bin/voile eval 'Voile.Release.create_database()' && /app/bin/voile eval 'Voile.Release.migrate()' && /app/bin/voile eval 'Voile.Release.seed()' && /app/bin/voile eval 'Voile.Release.import_data()'
        exec /app/bin/voile start

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local

networks:
  voile_prod:
    driver: bridge
