version: "3.8"

services:
  db:
    container_name: voile_prod_db
    image: docker.io/library/postgres:15
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${VOILE_POSTGRES_USER:-voile}
      POSTGRES_PASSWORD: ${VOILE_POSTGRES_PASSWORD:-voile}
      POSTGRES_DB: ${VOILE_POSTGRES_DB:-voile_prod}
    volumes:
      - /data/voile/postgres:/var/lib/postgresql/data:Z
    ports:
      - "5432:5432"
    network_mode: host

  web:
    container_name: voile_prod_web
    build:
      context: /data/pustaka
      dockerfile: Containerfile
      args:
        MIX_ENV: prod
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.prod
    environment:
      PHX_SERVER: "true"
      # Database is on host networking, so connect to localhost
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
    ports:
      - "4000:4000"
    volumes:
      - /data/voile/uploads:/app/priv/static/uploads:Z
      - /data/voile/uploads:/app/lib/voile-0.1.0/priv/static/uploads:Z
      - /data/voile/images:/app/priv/static/images:Z
      - /data/voile/sfx:/app/priv/static/sfx:Z
    command:
      - "/bin/sh"
      - "-c"
      - |
        echo "Waiting for PostgreSQL at localhost:5432..."
        timeout=60
        elapsed=0
        until pg_isready -h localhost -p 5432 -U ${VOILE_POSTGRES_USER:-voile} > /dev/null 2>&1; do
          if [ $$elapsed -ge $$timeout ]; then
            echo "ERROR: Database failed to become ready after $${timeout}s"
            exit 1
          fi
          echo "PostgreSQL not ready yet, waiting... ($${elapsed}s/$${timeout}s)"
          sleep 2
          elapsed=$$((elapsed + 2))
        done
        echo "PostgreSQL is ready! Running release tasks..."
        /app/bin/voile eval 'Voile.Release.create_database()' && \
        /app/bin/voile eval 'Voile.Release.migrate()' && \
        /app/bin/voile eval 'Voile.Release.seed()' && \
        /app/bin/voile eval 'Voile.Release.import_data()'
        echo "Starting Voile application..."
        exec /app/bin/voile start
