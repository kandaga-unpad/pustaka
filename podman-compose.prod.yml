version: "3.8"

networks:
  voile_prod:
    driver: bridge

services:
  db:
    image: docker.io/library/postgres:15
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${VOILE_POSTGRES_USER:-voile}
      POSTGRES_PASSWORD: ${VOILE_POSTGRES_PASSWORD:-voile}
      POSTGRES_DB: ${VOILE_POSTGRES_DB:-voile}
    volumes:
      - /data/voile/postgres:/var/lib/postgresql/data:z
    ports:
      - "5432:5432" # External:Internal (5433 on host to avoid conflicts)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VOILE_POSTGRES_USER:-voile}"]
      interval: 10s
      retries: 5
    networks:
      - voile_prod

  web:
    build:
      context: /data/pustaka
      dockerfile: Containerfile
      args:
        MIX_ENV: prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      PHX_SERVER: "true"
    ports:
      - "4000:4000"
    volumes:
      - /data/voile/uploads:/app/priv/static/uploads:z
      - /data/voile/uploads:/app/lib/voile-0.1.0/priv/static/uploads:z
      - /data/voile/images:/app/priv/static/images:z
      - /data/voile/sfx:/app/priv/static/sfx:z
    networks:
      - voile_prod
    command:
      - "/bin/sh"
      - -c
      - |
        echo "Waiting for DB at db:5432..."
        until pg_isready -h db -p 5432 -U ${VOILE_POSTGRES_USER:-voile}; do
          echo "DB not ready yet, sleeping 2s..."
          sleep 2
        done
        echo "DB is ready — running release tasks"
        /app/bin/voile eval 'Voile.Release.create_database()' && \
        /app/bin/voile eval 'Voile.Release.migrate()' && \
        /app/bin/voile eval 'Voile.Release.seed()' && \
        /app/bin/voile eval 'Voile.Release.import_data()'
        exec /app/bin/voile start
